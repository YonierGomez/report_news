name: Docker Image CI for report_news (multi-arch)

on:
  schedule:
    - cron: '0 8 * * 1' # Cada lunes a las 8:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Forzar build y push aunque no haya nueva versión de Alpine'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  check_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        name: Download codigo from repo

      - name: Get latest Alpine version
        id: alpine_version
        run: |
          ALPINE_VERSION=$(docker run --rm alpine:latest cat /etc/alpine-release)
          echo "version=$ALPINE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Alpine version: $ALPINE_VERSION"

      - name: Get latest release tag from repo
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "none")
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest release tag: $LATEST_TAG"

      - name: Compare versions
        id: compare
        run: |
          ALPINE="v${{ steps.alpine_version.outputs.version }}"
          LATEST="${{ steps.latest_release.outputs.tag }}"
          FORCE="${{ github.event.inputs.force_build }}"
          echo "Alpine: $ALPINE vs Latest release: $LATEST (force: $FORCE)"
          if [ "$ALPINE" != "$LATEST" ] || [ "$FORCE" = "true" ]; then
            echo "new_version=true" >> "$GITHUB_OUTPUT"
            echo "Build necesario"
          else
            echo "new_version=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios"
          fi

      - name: Set up QEMU
        if: steps.compare.outputs.new_version == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.compare.outputs.new_version == 'true'
        uses: docker/setup-buildx-action@v4.0.0

      - name: Docker Login
        if: steps.compare.outputs.new_version == 'true'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.USER_HUB }}
          password: ${{ secrets.PASS_HUB }}

      - name: Build and push Docker image
        if: steps.compare.outputs.new_version == 'true'
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            neytor/report_news:latest
            neytor/report_news:${{ steps.alpine_version.outputs.version }}

      - name: Get Alpine release notes
        if: steps.compare.outputs.new_version == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.alpine_version.outputs.version }}"
          # Extraer major.minor (3.21.3 -> 3.21)
          MAJOR_MINOR=$(echo "$VERSION" | grep -oP '^\d+\.\d+')
          URL="https://alpinelinux.org/posts/Alpine-${VERSION}-released.html"

          echo "Fetching release notes from: $URL"

          NOTES=$(curl -sf "$URL" 2>/dev/null | \
            sed -n '/<article/,/<\/article>/p' | \
            sed 's/<[^>]*>//g' | \
            sed '/^$/d' | \
            head -30 || echo "Ver novedades en https://alpinelinux.org/releases/")

          echo "$NOTES" > /tmp/alpine_changelog.txt
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.compare.outputs.new_version == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.alpine_version.outputs.version }}"
          VERSION="${{ steps.alpine_version.outputs.version }}"

          # Si el release ya existe (force_build), no crear otro
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG ya existe, omitiendo creación"
            exit 0
          fi

          CHANGELOG=$(cat /tmp/alpine_changelog.txt)
          NOTES_URL="${{ steps.changelog.outputs.url }}"

          cat > /tmp/release_notes.md << EOF
          ## report_news on Alpine Linux ${VERSION}

          ### Novedades de Alpine ${VERSION}

          \`\`\`
          ${CHANGELOG}
          \`\`\`

          > 📋 [Release notes completas](${NOTES_URL})

          ### Docker tags

          \`\`\`bash
          docker pull neytor/report_news:latest
          docker pull neytor/report_news:${VERSION}
          \`\`\`

          ### Arquitecturas soportadas

          | Arquitectura | Plataforma | Comando para forzar |
          |---|---|---|
          | x86-64 | PCs, servidores | \`docker pull --platform linux/amd64 neytor/report_news\` |
          | ARM64 | Raspberry Pi 3/4/5, Apple Silicon | \`docker pull --platform linux/arm64 neytor/report_news\` |
          | ARMv7 | Raspberry Pi 2, IoT | \`docker pull --platform linux/arm/v7 neytor/report_news\` |

          ### Uso rápido

          \`\`\`bash
          docker run -d --name report_news -e TOKEN="tu_token_telegram" neytor/report_news
          \`\`\`
          EOF

          gh release create "$TAG" \
            --title "report_news ${VERSION}" \
            --notes-file /tmp/release_notes.md
